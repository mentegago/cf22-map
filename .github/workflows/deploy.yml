name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master  # Change this to your default branch if different
  workflow_dispatch:  # Allow manual trigger

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'  # Specify your Flutter version
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build web
        env:
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          UMAMI_ENDPOINT: ${{ secrets.UMAMI_ENDPOINT }}
          UMAMI_HOSTNAME: ${{ secrets.UMAMI_HOSTNAME }}
        run: |
          flutter build web --release \
            --base-href / \
            --pwa-strategy=offline-first \
            --no-web-resources-cdn \
            --dart-define=UMAMI_WEBSITE_ID="$UMAMI_WEBSITE_ID" \
            --dart-define=UMAMI_ENDPOINT="$UMAMI_ENDPOINT" \
            --dart-define=UMAMI_HOSTNAME="$UMAMI_HOSTNAME"
      
      - name: Add .nojekyll file
        run: touch build/web/.nojekyll
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

